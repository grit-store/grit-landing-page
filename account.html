<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/pointer.png">
    <title>GRIT | My Account</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="site-header"></div>

    <!-- Account Dashboard -->
    <main class="account-section">
        <header class="section-header">
            <h2>Welcome, <span id="user-name-display">User</span></h2>
            <p>Manage your orders and profile details.</p>
        </header>

        <div class="account-grid">
            <aside class="account-sidebar">
                <button class="account-nav-btn active" data-pane="orders">Order History</button>
                <button class="account-nav-btn" data-pane="profile">Profile Details</button>
                <button class="account-nav-btn" id="account-logout" style="color: #ff4d4d; margin-top: auto;">Logout</button>
            </aside>

            <section class="account-content">
                <!-- Orders Pane -->
                <div id="pane-orders" class="account-pane active">
                    <h3 style="margin-bottom: 2rem;">Recent Orders</h3>
                    <div id="order-list">
                        <!-- Orders will be injected here -->
                    </div>
                </div>

                <!-- Profile Pane -->
                <div id="pane-profile" class="account-pane">
                    <h3 style="margin-bottom: 2rem;">Profile Information</h3>
                    <div class="order-card">
                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label>Full Name</label>
                            <div style="font-size: 1.2rem; margin-top: 0.5rem;" id="user-name-display-full">Loading...</div>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <div style="font-size: 1.2rem; margin-top: 0.5rem;" id="user-email-display">Loading...</div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="site-footer"></div>

    <!-- Shopify, GSAP -->
    <script src="https://sdks.shopifycdn.com/js-buy-sdk/v2/latest/index.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="js/components.js"></script>
    <script src="js/ui/utils.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui/products.js"></script>
    <script src="js/ui/cart.js"></script>
    <script src="js/ui/wishlist.js"></script>
    <script src="js/ui/nav.js"></script>
    <script src="js/ui/animations.js"></script>
    <script src="js/ui/reviews.js"></script>
    <script src="js/ui/misc.js"></script>
    <script src="js/pages/collection.js"></script>
    <script src="js/pages/product.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Set the full name in profile too
        const u = auth.getUser();
        if (u) {
            const fullNameEl = document.getElementById('user-name-display-full');
            if (fullNameEl) fullNameEl.textContent = u.name;
        }
        
        if (typeof gsap !== 'undefined') {
            gsap.from('.account-grid', {
                y: 20,
                opacity: 0,
                duration: 0.8,
                ease: "power2.out"
            });
        }
    </script>
</body>
</html>
