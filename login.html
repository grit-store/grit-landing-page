<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/pointer.png">
    <title>GRIT | Login</title>
    <meta name="description" content="Log in to your GRIT account.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Force same header/logo sizes as the index page on the login page */
        .navbar {
            background: rgba(18, 18, 18, 0.9) !important;
            backdrop-filter: blur(10px) !important;
            border-bottom: 1px solid var(--color-accent) !important;
            top: 35px !important;
        }
        .logo-image {
            height: 80px !important;
        }
        .nav-container {
            padding: 1rem 5% !important;
        }
        @media (max-width: 768px) {
            .logo-image {
                height: 50px !important;
            }
            .nav-container {
                padding: 1rem 5% !important;
            }
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <!-- Auth Section -->
    <main class="auth-section">
        <div class="auth-container" id="auth-container">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">SIGN IN</button>
                <button class="auth-tab" data-tab="signup">CREATE ACCOUNT</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <p class="auth-error"></p>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password" required>
                </div>
                <p class="auth-error"></p>
                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>
        </div>
    </main>

    <div id="site-overlays"></div>

    <div id="site-footer"></div>

    <!-- Shopify, GSAP -->
    <script src="https://sdks.shopifycdn.com/js-buy-sdk/v2/latest/index.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="js/components.js"></script>
    <script src="js/ui/utils.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui/products.js"></script>
    <script src="js/ui/cart.js"></script>
    <script src="js/ui/wishlist.js"></script>
    <script src="js/ui/nav.js"></script>
    <script src="js/ui/animations.js"></script>
    <script src="js/ui/reviews.js"></script>
    <script src="js/ui/misc.js"></script>
    <script src="js/pages/collection.js"></script>
    <script src="js/pages/product.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Animate in gracefully if GSAP loaded
        if (typeof gsap !== 'undefined') {
            gsap.from('#auth-container', {
                y: 30,
                opacity: 0,
                duration: 0.8,
                ease: "power3.out"
            });
        }
    </script>
</body>
</html>
