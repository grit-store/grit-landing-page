<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/pointer.png">
    <title>GRIT | Login</title>
    <meta name="description" content="Log in to your GRIT account.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dragon-bg"></div>
    <canvas id="interactive-bg"></canvas>

    <!-- Navigation -->
    <nav class="navbar scrolled">
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="assets/logo.png" alt="GRIT" style="height: 90px; width: auto;"></a>
            <div class="nav-links">
                <a href="collection.html?category=men">Men</a>
                <a href="collection.html?category=women">Women</a>
                <a href="collection.html?category=others">Others</a>
                <a href="about.html">About</a>
            </div>
            <div class="nav-actions">
                <a href="index.html" class="icon-button">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <!-- Auth Section -->
    <main class="auth-section">
        <div class="auth-container" id="auth-container">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">SIGN IN</button>
                <button class="auth-tab" data-tab="signup">CREATE ACCOUNT</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <p class="auth-error"></p>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password" required>
                </div>
                <p class="auth-error"></p>
                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-bottom">
            <p>&copy; 2026 GRIT. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="auth.js"></script>
    <script>
        // Animate in gracefully if GSAP loaded
        if (typeof gsap !== 'undefined') {
            gsap.from('#auth-container', {
                y: 30,
                opacity: 0,
                duration: 0.8,
                ease: "power3.out"
            });
        }
    </script>
</body>
</html>
