<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="assets/pointer.png">
    <title>GRIT | Collection</title>
    <meta name="description" content="Shop the GRIT collection. Premium clothing for every style.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=1.1">
</head>
<body>
    <div id="site-header"></div>

    <!-- Collection Header -->
    <section class="collection-hero">
        <div class="collection-hero-content">
            <p class="collection-breadcrumb"><a href="index.html">Home</a> / <span id="collection-category-name">Collection</span></p>
            <h1 id="collection-title">Collection</h1>
            <p id="collection-subtitle" class="collection-subtitle"></p>
        </div>
    </section>

    <!-- Collection Layout -->
    <section class="collection-layout-wrapper">
        <button class="mobile-filter-toggle" id="mobile-filter-toggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
            Filter & Sort
        </button>

        <aside class="collection-sidebar" id="collection-sidebar">
            <div class="sidebar-header mobile-only">
                <h3>Filters</h3>
                <button class="close-filters" id="close-filters">&times;</button>
            </div>
            
            <div class="sidebar-block">
                <h3>Sort By</h3>
                <select id="sort-select" class="sort-select">
                    <option value="featured">Featured</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="newest">Newest Arrivals</option>
                    <option value="gender-men">Male Outfits First</option>
                    <option value="gender-women">Female Outfits First</option>
                </select>
            </div>
            
            <div class="sidebar-block">
                <h3>Size</h3>
                <div class="filter-options" id="filter-sizes">
                    <!-- Dynamic checkboxes injected by JS -->
                    <p class="filter-loading">Loading sizes...</p>
                </div>
            </div>

            <div class="sidebar-block">
                <h3>Color</h3>
                <div class="filter-options" id="filter-colors">
                    <!-- Dynamic checkboxes injected by JS -->
                    <p class="filter-loading">Loading colors...</p>
                </div>
            </div>
        </aside>

        <main class="collection-main">
            <!-- Sections Container -->
            <div id="category-sections-container">
                <!-- Skeleton Loaders -->
                <div class="skeleton-grid">
                    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div></div>
                    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div></div>
                    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div></div>
                    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div></div>
                </div>
            </div>
        </main>
    </section>


    <div id="site-overlays"></div>

    <div id="site-footer"></div>


    <!-- Shopify, GSAP -->
    <script src="https://sdks.shopifycdn.com/js-buy-sdk/v2/latest/index.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="js/components.js"></script>
    <script src="js/ui/utils.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui/products.js"></script>
    <script src="js/ui/cart.js"></script>
    <script src="js/ui/wishlist.js"></script>
    <script src="js/ui/nav.js"></script>
    <script src="js/ui/animations.js"></script>
    <script src="js/ui/reviews.js"></script>
    <script src="js/ui/misc.js"></script>
    <script src="js/pages/collection.js"></script>
    <script src="js/pages/product.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
